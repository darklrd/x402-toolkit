version: "3.9"

services:
  x402-demo:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PAYMENT_MODE=mock
    volumes:
      - ./examples/.env.solana:/app/examples/.env.solana:ro
    restart: unless-stopped

